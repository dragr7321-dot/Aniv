<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hand Tracking Ke Bentuk</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  
  <style>
    body { margin: 0; display: flex; justify-content: center; background: #111; }
    .container { position: relative; width: 100%; max-width: 500px; }
    #webcam { transform: rotateY(180deg); width: 100%; height: auto; display: none; }
    #output_canvas { position: absolute; left: 0; top: 0; width: 100%; transform: rotateY(180deg); }
  </style>
</head>

<body>
  <div class="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
      // Atur ukuran canvas sesuai video
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Gambar background transparan atau efek tertentu di sini
      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          // Opsi 1: Gambar garis rangka tangan standar
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
          
          // Opsi 2: Ubah titik jari menjadi bentuk lingkaran/bola
          for(let point of landmarks) {
            canvasCtx.beginPath();
            canvasCtx.arc(point.x * canvasElement.width, point.y * canvasElement.height, 8, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "cyan";
            canvasCtx.fill();
          }
        }
      }
      canvasCtx.restore();
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
